# Render.com Deployment Configuration
# African Fashion Marketplace - Full Stack Deployment

services:
  # Frontend Web Service (Static Site)
  - type: web
    name: african-fashion-web
    runtime: static
    buildCommand: cd apps/web && npm install && npm run build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        value: https://african-fashion-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend API Service
  - type: web
    name: african-fashion-api
    runtime: node
    plan: free
    buildCommand: cd apps/api && npm install && npx tsc && npx prisma generate
    startCommand: cd apps/api && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: african-fashion-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://african-fashion-web.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

# PostgreSQL Database
databases:
  - name: african-fashion-db
    plan: free
    ipAllowList: []
